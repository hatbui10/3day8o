<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>catday8o</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --accent: #38bdf8;
            --danger: #f43f5e;
            --text: #f8fafc;
            --stt-color: #fbbf24;
            --undo: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .container {
            background: var(--card);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 500px; /* Giới hạn độ rộng tối đa trên tablet/pc */
        }

        /* Ô M đưa lên đầu */
        .result-section {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border);
        }

        .header-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            width: 100%;
        }

        .input-group { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 5px; 
        }

        input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: #111827;
            color: var(--text);
            outline: none;
            -webkit-appearance: none; /* Tránh bo góc mặc định trên iOS */
        }

        #colsInput { width: 60px; border-color: #a855f7; color: #a855f7; }
        #startSTT { width: 75px; border-color: #fbbf24; color: #fbbf24; }
        #inputN { border-color: var(--accent); background: #1e293b; }
        #inputM { border-color: var(--danger); color: var(--danger); width: 65px; height: 65px; font-size: 24px; }

        .btn-undo {
            height: 50px;
            padding: 0 12px;
            background: var(--undo);
            color: #111827;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
        }

        /* Khu vực lưới có thanh cuộn ngang cho mobile */
        .grid-wrapper {
            width: 100%;
            overflow-x: auto;
            padding: 10px 0;
            display: flex;
            justify-content: flex-start; /* Để cuộn từ trái sang */
            -webkit-overflow-scrolling: touch; /* Cuộn mượt trên iOS */
        }

        .grid {
            display: grid;
            gap: 8px;
            margin: 0 auto; /* Căn giữa nếu lưới nhỏ hơn màn hình */
        }

        .cell-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stt-label {
            font-size: 10px;
            color: var(--stt-color);
            font-weight: bold;
            height: 14px;
        }

        .cell-input {
            width: 42px;
            height: 42px;
            font-size: 16px;
            background: #0f172a;
            border-radius: 8px;
        }

        label { 
            color: #94a3b8; 
            font-size: 10px; 
            font-weight: bold; 
            text-transform: uppercase; 
            text-align: center;
        }

        /* Thanh cuộn tinh tế hơn */
        .grid-wrapper::-webkit-scrollbar { height: 4px; }
        .grid-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="result-section">
            <div class="input-group">
                <label>KẾT QUẢ M</label>
                <input type="text" id="inputM" readonly>
            </div>
        </div>

        <div class="header-controls">
            <div class="input-group">
                <label>Ô/Hàng</label>
                <input type="number" id="colsInput" value="8" min="1" max="15">
            </div>
            <div class="input-group">
                <label>STT Đầu</label>
                <input type="text" id="startSTT" value="1" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>NHẬP N</label>
                <input type="text" id="inputN" maxlength="2" inputmode="numeric" autocomplete="off">
            </div>
            <button class="btn-undo" id="undoBtn">UNDO ↩</button>
        </div>

        <div class="grid-wrapper">
            <div class="grid" id="mainGrid"></div>
        </div>
    </div>

    <script>
        const inputN = document.getElementById('inputN');
        const startSTTInput = document.getElementById('startSTT');
        const colsInput = document.getElementById('colsInput');
        const inputM = document.getElementById('inputM');
        const undoBtn = document.getElementById('undoBtn');
        const grid = document.getElementById('mainGrid');

        let rows = 3;
        let cols = 8;
        let total = rows * cols;
        let data = [];
        let history = [];

        initGrid();

        colsInput.addEventListener('change', () => {
            let val = parseInt(colsInput.value);
            if(val > 0 && val <= 15) {
                cols = val;
                initGrid();
            }
        });

        function initGrid() {
            total = rows * cols;
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            data = Array(total).fill(null).map(() => ({ val: '', stt: '' }));
            history = [];
            inputM.value = '';

            for (let i = 0; i < total; i++) {
                const container = document.createElement('div');
                container.className = 'cell-container';
                const sttLabel = document.createElement('div');
                sttLabel.className = 'stt-label';
                sttLabel.id = `stt-${i}`;
                const el = document.createElement('input');
                el.type = 'text';
                el.readOnly = true;
                el.className = 'cell-input';
                el.id = `cell-${i}`;
                container.appendChild(sttLabel);
                container.appendChild(el);
                grid.appendChild(container);
            }
        }

        startSTTInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            if (window.focusTimer) clearTimeout(window.focusTimer);
            window.focusTimer = setTimeout(() => { inputN.focus(); }, 2000);
        });

        inputN.addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = val;

            if (val !== "") {
                saveHistory();
                let currentSTT = parseInt(startSTTInput.value) || 1;
                
                inputM.value = data[total - 1].val;

                for (let i = total - 1; i > 0; i--) {
                    data[i] = { ...data[i - 1] };
                }

                data[0] = { val: val, stt: currentSTT };
                startSTTInput.value = currentSTT + 1;

                renderReverse();
                inputN.value = '';
            }
        });

        undoBtn.addEventListener('click', () => {
            if (history.length > 0) {
                const lastState = history.pop();
                data = lastState.data;
                startSTTInput.value = lastState.startSTT;
                inputM.value = lastState.inputM;
                renderReverse();
                inputN.focus();
            }
        });

        function saveHistory() {
            history.push({
                data: JSON.parse(JSON.stringify(data)),
                startSTT: startSTTInput.value,
                inputM: inputM.value
            });
            if (history.length > 50) history.shift();
        }

        function renderReverse() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const gridIdx = r * cols + c;
                    const dataIdx = (r * cols) + (cols - 1 - c);
                    const cell = document.getElementById(`cell-${gridIdx}`);
                    const stt = document.getElementById(`stt-${gridIdx}`);
                    if(cell) {
                        cell.value = data[dataIdx].val;
                        stt.innerText = data[dataIdx].stt || '';
                    }
                }
            }
        }

        window.onload = () => startSTTInput.focus();
        
        // Luôn giữ focus vào ô nhập N khi bấm vào vùng trống
        document.addEventListener('click', (e) => {
            const ignoreList = ['startSTT', 'colsInput', 'undoBtn'];
            if (!ignoreList.includes(e.target.id) && e.target.tagName !== 'INPUT') {
                inputN.focus();
            }
        });
    </script>
</body>
</html>
