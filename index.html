<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch STT và N - Có Undo</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --accent: #38bdf8;
            --danger: #f43f5e;
            --text: #f8fafc;
            --stt-color: #fbbf24;
            --undo: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 30px;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header-controls {
            display: flex;
            gap: 20px;
            align-items: flex-end;
        }

        .input-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }

        input {
            width: 55px;
            height: 55px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: #111827;
            color: var(--text);
            outline: none;
        }

        #startSTT { width: 85px; border-color: #fbbf24; color: #fbbf24; }
        #inputN { border-color: var(--accent); }
        #inputM { border-color: var(--danger); color: var(--danger); }

        .btn-undo {
            height: 55px;
            padding: 0 20px;
            background: var(--undo);
            color: #111827;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-undo:hover { background: #cbd5e1; transform: translateY(-2px); }
        .btn-undo:active { transform: translateY(0); }

        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            padding: 10px;
        }

        .cell-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .stt-label {
            font-size: 11px;
            color: var(--stt-color);
            font-weight: bold;
            height: 15px;
        }

        .cell-input {
            width: 50px;
            height: 50px;
            font-size: 20px;
            background: #0f172a;
        }

        label { color: #94a3b8; font-size: 12px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-controls">
            <div class="input-group">
                <label>STT Bắt đầu</label>
                <input type="text" id="startSTT" value="1" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
            <div class="input-group">
                <label>NHẬP N</label>
                <input type="text" id="inputN" maxlength="2" inputmode="numeric" autocomplete="off">
            </div>
            <button class="btn-undo" id="undoBtn">UNDO ↩</button>
        </div>

        <div class="grid" id="mainGrid"></div>

        <div class="input-group">
            <label>KẾT QUẢ M</label>
            <input type="text" id="inputM" readonly>
        </div>
    </div>

    <script>
        const inputN = document.getElementById('inputN');
        const startSTTInput = document.getElementById('startSTT');
        const inputM = document.getElementById('inputM');
        const undoBtn = document.getElementById('undoBtn');
        const grid = document.getElementById('mainGrid');
        const total = 24;

        // Mảng chính
        let data = Array(total).fill(null).map(() => ({ val: '', stt: '' }));
        
        // Ngăn xếp để lưu lịch sử (History Stack)
        let history = [];

        // Tạo giao diện
        for (let i = 0; i < total; i++) {
            const container = document.createElement('div');
            container.className = 'cell-container';
            const sttLabel = document.createElement('div');
            sttLabel.className = 'stt-label';
            sttLabel.id = `stt-${i}`;
            const el = document.createElement('input');
            el.type = 'text';
            el.readOnly = true;
            el.className = 'cell-input';
            el.id = `cell-${i}`;
            container.appendChild(sttLabel);
            container.appendChild(el);
            grid.appendChild(container);
        }

        // Logic Auto Focus sang ô N sau 2s
        startSTTInput.addEventListener('input', () => {
            if (window.focusTimer) clearTimeout(window.focusTimer);
            window.focusTimer = setTimeout(() => {
                inputN.focus();
            }, 2000);
        });

        // Nhập N
        inputN.addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = val;

            if (val !== "") {
                // LƯU LỊCH SỬ TRƯỚC KHI THAY ĐỔI
                saveHistory();

                let currentSTT = parseInt(startSTTInput.value) || 1;

                // Cập nhật ô M
                inputM.value = data[total - 1].val;

                // Dịch chuyển
                for (let i = total - 1; i > 0; i--) {
                    data[i] = { ...data[i - 1] };
                }

                data[0] = { val: val, stt: currentSTT };
                startSTTInput.value = currentSTT + 1;

                renderReverse();
                inputN.value = '';
            }
        });

        // Logic UNDO
        undoBtn.addEventListener('click', () => {
            if (history.length > 0) {
                // Lấy trạng thái cuối cùng trong lịch sử
                const lastState = history.pop();
                
                // Khôi phục dữ liệu
                data = lastState.data;
                startSTTInput.value = lastState.startSTT;
                inputM.value = lastState.inputM;

                renderReverse();
                inputN.focus();
            } else {
                alert("Không còn gì để Undo!");
            }
        });

        function saveHistory() {
            // Lưu bản sao sâu (deep copy) của mảng data và các giá trị liên quan
            history.push({
                data: JSON.parse(JSON.stringify(data)),
                startSTT: startSTTInput.value,
                inputM: inputM.value
            });
            // Giới hạn lịch sử 50 bước để tránh tốn bộ nhớ
            if (history.length > 50) history.shift();
        }

        function renderReverse() {
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 8; col++) {
                    const gridIdx = row * 8 + col;
                    const dataIdx = (row * 8) + (7 - col);
                    document.getElementById(`cell-${gridIdx}`).value = data[dataIdx].val;
                    document.getElementById(`stt-${gridIdx}`).innerText = data[dataIdx].stt || '';
                }
            }
        }

        window.onload = () => startSTTInput.focus();

        document.addEventListener('click', (e) => {
            if (e.target !== startSTTInput && e.target !== undoBtn) {
                inputN.focus();
            }
        });
    </script>
</body>
</html>
