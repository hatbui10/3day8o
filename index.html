<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Số Tùy Chỉnh Hàng - Dark Mode</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --accent: #38bdf8;
            --danger: #f43f5e;
            --text: #f8fafc;
            --stt-color: #fbbf24;
            --undo: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 95vw;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
        }

        .input-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }

        input {
            width: 55px;
            height: 55px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: #111827;
            color: var(--text);
            outline: none;
        }

        #colsInput { width: 70px; border-color: #a855f7; color: #a855f7; } /* Màu tím cho cấu hình cột */
        #startSTT { width: 80px; border-color: #fbbf24; color: #fbbf24; }
        #inputN { border-color: var(--accent); }
        #inputM { border-color: var(--danger); color: var(--danger); }

        .btn-undo {
            height: 55px;
            padding: 0 15px;
            background: var(--undo);
            color: #111827;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-undo:hover { background: #cbd5e1; }

        .grid {
            display: grid;
            gap: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.1);
            border-radius: 12px;
        }

        .cell-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .stt-label {
            font-size: 11px;
            color: var(--stt-color);
            font-weight: bold;
            height: 15px;
        }

        .cell-input {
            width: 48px;
            height: 48px;
            font-size: 18px;
            background: #0f172a;
        }

        label { color: #94a3b8; font-size: 11px; font-weight: bold; text-transform: uppercase; text-align: center;}
    </style>
</head>
<body>

    <div class="container">
        <div class="header-controls">
            <div class="input-group">
                <label>Số ô/Hàng</label>
                <input type="number" id="colsInput" value="8" min="1" max="15">
            </div>
            <div class="input-group">
                <label>STT Bắt đầu</label>
                <input type="text" id="startSTT" value="1" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
            <div class="input-group">
                <label>NHẬP N</label>
                <input type="text" id="inputN" maxlength="2" inputmode="numeric" autocomplete="off">
            </div>
            <button class="btn-undo" id="undoBtn">UNDO ↩</button>
        </div>

        <div class="grid" id="mainGrid"></div>

        <div class="input-group">
            <label>KẾT QUẢ M</label>
            <input type="text" id="inputM" readonly>
        </div>
    </div>

    <script>
        const inputN = document.getElementById('inputN');
        const startSTTInput = document.getElementById('startSTT');
        const colsInput = document.getElementById('colsInput');
        const inputM = document.getElementById('inputM');
        const undoBtn = document.getElementById('undoBtn');
        const grid = document.getElementById('mainGrid');

        let rows = 3;
        let cols = 8;
        let total = rows * cols;
        let data = [];
        let history = [];

        // Khởi tạo lưới lần đầu
        initGrid();

        // Lắng nghe thay đổi số cột
        colsInput.addEventListener('change', () => {
            let val = parseInt(colsInput.value);
            if(val > 0 && val <= 15) {
                cols = val;
                initGrid();
            }
        });

        function initGrid() {
            total = rows * cols;
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            data = Array(total).fill(null).map(() => ({ val: '', stt: '' }));
            history = [];
            inputM.value = '';

            for (let i = 0; i < total; i++) {
                const container = document.createElement('div');
                container.className = 'cell-container';
                const sttLabel = document.createElement('div');
                sttLabel.className = 'stt-label';
                sttLabel.id = `stt-${i}`;
                const el = document.createElement('input');
                el.type = 'text';
                el.readOnly = true;
                el.className = 'cell-input';
                el.id = `cell-${i}`;
                container.appendChild(sttLabel);
                container.appendChild(el);
                grid.appendChild(container);
            }
        }

        // Tự động focus sang N sau 2s khi nhập STT
        startSTTInput.addEventListener('input', () => {
            if (window.focusTimer) clearTimeout(window.focusTimer);
            window.focusTimer = setTimeout(() => { inputN.focus(); }, 2000);
        });

        // Nhập N
        inputN.addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = val;

            if (val !== "") {
                saveHistory();

                let currentSTT = parseInt(startSTTInput.value) || 1;
                
                // Ô M lấy giá trị cũ nhất (data cuối mảng)
                inputM.value = data[total - 1].val;

                // Dịch chuyển dữ liệu
                for (let i = total - 1; i > 0; i--) {
                    data[i] = { ...data[i - 1] };
                }

                data[0] = { val: val, stt: currentSTT };
                startSTTInput.value = currentSTT + 1;

                renderReverse();
                inputN.value = '';
            }
        });

        // Undo
        undoBtn.addEventListener('click', () => {
            if (history.length > 0) {
                const lastState = history.pop();
                data = lastState.data;
                startSTTInput.value = lastState.startSTT;
                inputM.value = lastState.inputM;
                renderReverse();
                inputN.focus();
            }
        });

        function saveHistory() {
            history.push({
                data: JSON.parse(JSON.stringify(data)),
                startSTT: startSTTInput.value,
                inputM: inputM.value
            });
            if (history.length > 50) history.shift();
        }

        function renderReverse() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const gridIdx = r * cols + c;
                    // Ô bên phải nhất của mỗi hàng nhận data mới hơn (Index 0, cols, 2*cols...)
                    const dataIdx = (r * cols) + (cols - 1 - c);
                    
                    if(document.getElementById(`cell-${gridIdx}`)) {
                        document.getElementById(`cell-${gridIdx}`).value = data[dataIdx].val;
                        document.getElementById(`stt-${gridIdx}`).innerText = data[dataIdx].stt || '';
                    }
                }
            }
        }

        window.onload = () => startSTTInput.focus();
        document.addEventListener('click', (e) => {
            if (!['startSTT', 'colsInput', 'undoBtn'].includes(e.target.id)) {
                inputN.focus();
            }
        });
    </script>
</body>
</html>
